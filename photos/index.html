<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Journals — Jesse.Ventures</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #080808;
      font-family: 'JetBrains Mono', monospace;
      color: #c8a96e;
      min-height: 100vh;
      padding: 2.5rem 1.5rem;
      -webkit-font-smoothing: antialiased;
    }

    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,0,0,0.04) 3px, rgba(0,0,0,0.04) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    .wrap { max-width: 960px; margin: 0 auto; }

    .masthead {
      margin-bottom: 2.5rem;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid #1a1400;
    }

    .site-eyebrow {
      font-size: 0.52rem;
      color: #39ff14;
      opacity: 0.4;
      letter-spacing: 0.22em;
      margin-bottom: 0.4rem;
    }

    .page-title {
      font-size: 2rem;
      font-weight: 700;
      color: #e8c87a;
      letter-spacing: 0.06em;
      line-height: 1;
      text-shadow: 0 0 40px rgba(212,160,23,0.15);
    }

    .page-stats {
      font-size: 0.58rem;
      color: #5a3e0a;
      letter-spacing: 0.12em;
      margin-top: 0.5rem;
    }

    .page-stats span { color: #d4a017; }

    .album-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.25rem;
    }

    .album-card {
      text-decoration: none;
      display: block;
      position: relative;
    }

    .album-cover {
      width: 100%;
      aspect-ratio: 4/3;
      overflow: hidden;
      background: #111;
      position: relative;
      border: 1px solid #1a1400;
    }

    .album-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0.85;
      transition: transform 0.4s ease, opacity 0.3s ease;
    }

    .album-card:hover .album-cover img {
      transform: scale(1.04);
      opacity: 1;
    }

    .album-badge {
      position: absolute;
      bottom: 0.5rem;
      right: 0.5rem;
      background: rgba(8,8,8,0.85);
      border: 1px solid #2a1f06;
      font-size: 0.5rem;
      color: #d4a017;
      letter-spacing: 0.1em;
      padding: 0.2rem 0.45rem;
    }

    .album-info { padding: 0.65rem 0 0; }

    .album-name {
      font-size: 0.82rem;
      font-weight: 700;
      color: #e8c87a;
      letter-spacing: 0.04em;
      line-height: 1.2;
      transition: color 0.2s;
    }
    .album-card:hover .album-name { color: #FFD060; }

    .album-date {
      font-size: 0.55rem;
      color: #5a3e0a;
      letter-spacing: 0.1em;
      margin-top: 0.2rem;
    }

    .album-loc {
      font-size: 0.55rem;
      color: #3a2a08;
      letter-spacing: 0.08em;
      margin-top: 0.1rem;
    }

    .page-footer {
      margin-top: 3rem;
      padding-top: 1rem;
      border-top: 1px solid #1a1400;
    }

    a.back-link {
      font-size: 0.68rem;
      color: #39ff14;
      text-decoration: none;
      opacity: 0.5;
      letter-spacing: 0.08em;
      transition: opacity 0.2s;
    }
    a.back-link:hover { opacity: 1; }

    @media (max-width: 700px) {
      .album-grid { grid-template-columns: repeat(2, 1fr); gap: 1rem; }
      .page-title { font-size: 1.5rem; }
    }
    @media (max-width: 420px) {
      .album-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <div class="masthead">
    <div class="site-eyebrow">// JESSE.VENTURES</div>
    <div class="page-title">PHOTO JOURNALS</div>
    <div class="page-stats">
      <span>2</span> ALBUMS &nbsp;&mdash;&nbsp;
      <span>204</span> PHOTOS
    </div>
  </div>

  <div class="album-grid">

    <a class="album-card" href="/photos/2602-antarctica/">
      <div class="album-cover">
        <img src="2602-antarctica/web/cover.jpg" alt="Antarctica">
        <div class="album-badge">51 PHOTOS</div>
      </div>
      <div class="album-info">
        <div class="album-name">ANTARCTICA</div>
        <div class="album-date">FEBRUARY 2026</div>
        <div class="album-loc">ANTARCTIC PENINSULA</div>
      </div>
    </a>

    <a class="album-card" href="/photos/2510-japan/">
      <div class="album-cover">
        <img src="2510-japan/web/cover.jpg" alt="Japan">
        <div class="album-badge">153 PHOTOS</div>
      </div>
      <div class="album-info">
        <div class="album-name">JAPAN</div>
        <div class="album-date">OCTOBER 2025</div>
        <div class="album-loc">TOKYO, OMAKI ONSEN, KANAZAWA, FUSSA</div>
      </div>
    </a>

  </div>

  <div class="page-footer">
    <a class="back-link" href="/">[&larr; jesse.ventures]</a>
  </div>

</div>
</body>
</html>
