<!DOCTYPE html>
<!-- This is my landing page for the THEN homepage -->
<html>
<head>
    <title>Homepage</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #c0c0c0;
            color: black;
        }
        h1, h2 {
            color: navy;
        }
        a {
            color: blue;
            text-decoration: underline;
            cursor: pointer;
        }
        a:visited {
            color: purple;
        }
        #container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        #header {
            height: 15%;
            background-color: navy;
            color: white !important;
            text-align: center;
            padding: 10px;
        }
        #main {
            display: flex;
            flex: 1;
        }
        #menu {
            width: 15%;
            background-color: lightgray;
            padding: 10px;
            font-family: Arial, sans-serif;
            font-size: 16px;
            color: navy;
        }
        #menu h2 {
            color: navy;
            font-weight: bold;
        }
        #menu a {
            color: purple;
            text-decoration: underline;
            font-weight: bold;
        }
        #menu a:visited {
            color: purple;
        }
        #menu a:hover {
            color: blue;
        }
        #content {
            flex: 1;
            padding: 10px;
            background: url('images/Paper-Texture-1-1024x768.jpg') repeat;
            background-size: cover;
        }

        /* Movie Section Styling */
        .movie-section {
            padding: 10px;
        }
        .movie {
            border-bottom: 1px dashed black;
            padding: 10px;
            display: flex;
            align-items: flex-start;
            flex-direction: row-reverse;
        }
        .movie img {
            max-width: 150px;
            margin-left: 15px;
        }
        .movie-content {
            flex: 1;
        }
        .rating {
            font-size: 20px;
        }
        .nav {
            background-color: #808080;
            padding: 10px;
        }
        .nav a {
            color: yellow;
            font-weight: bold;
            text-decoration: none;
        }
        .nav a:hover {
            text-decoration: underline;
        }
    </style>
    <script>
        function loadContent(content) {
            const contentDiv = document.getElementById('content');
            let html = '';

            if (content === 'books') {
                html = '<h2>Books</h2><p>Here are some of my favorite books...</p>';
            } else if (content === 'movies') {
                html = `
                    <h2>Jesse's Movie Reviews</h2>
                    <div class="nav">
                        <a href="#1995">1995</a> | <a href="#1994">1994</a> | <a href="#1993">1993</a>
                    </div>
                    <div class="movie-section" id="1994">
                        <h2>1994</h2>
                        <div class="movie">
                            <img src="images/reality_bites.jpg" alt="Reality Bites Poster">
                            <div class="movie-content">
                                <h3>Reality Bites</h3>
                                <p><b>Director:</b> Ben Stiller</p>
                                <p><b>Starring:</b> Winona Ryder, Ethan Hawke, Ben Stiller</p>
                                <p><b>Genre:</b> Romantic Comedy, Drama</p>
                                <p><b>Synopsis:</b> A group of Gen X friends navigate post-college life, romance, and their struggles to define success.</p>
                                <p class="rating"><b>Rating:</b> 🍷🍷🍷🍷</p>
                                <p><b>Comments:</b> Documentary within the movie so cool and smart, will they won’t they, grungy soundtrack. What’s not to like?</p>
                                <p><b>Theater, VHS, Wait For TV or Skip?:</b> Theater but hurry!</p>
                            </div>
                        </div>
                    </div>
                `;
            } else if (content === 'tv') {
                html = '<h2>TV Shows</h2><p>Great TV shows...</p>';
            } else if (content === 'more') {
                html = '<h2>More...</h2><p>Even more content coming soon!</p>';
            }

            contentDiv.innerHTML = html;
        }
    </script>
</head>
<body>
    <div id="container">
        <div id="header">
            <h1 style="color: white;">Welcome to Jesse's Homepage</h1>
            <marquee behavior="alternate" scrollamount="5">Enjoy the Vibes!</marquee>
        </div>
        <div id="main">
            <div id="menu">
                <h2>Navigation</h2>
                <ul>
                    <li><a onclick="loadContent('books')">Books</a></li>
                    <li><a onclick="loadContent('movies')">Movies</a></li>
                    <li><a onclick="loadContent('tv')">TV</a></li>
                    <li><a onclick="loadContent('more')">More...</a></li>
                </ul>
                <p>Click on the links above to navigate through the site.</p>
            </div>
            <div id="content">
                <h2>Welcome</h2>
                <p>Click on a link in the navigation menu to load content here.</p>
            </div>
        </div>
    </div>
</body>
</html>
