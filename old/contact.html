    body {

    .menu {
      white-space: pre;
      font-size: 18px;
      color: #FFBF00;
    }
    .menu a {
      color: #FFBF00;
      text-decoration: none;
      position: relative;
    }
    /* Default brackets for all links */
    .menu a::before {
      content: "[ ";
      color: #FFBF00;
      pointer-events: none;
    }
    .menu a::after {
      content: " ]";
      color: #FFBF00;
      pointer-events: none;
    }
    /* Hover effect for all links */
    .menu a:hover {
      color: green;
    }
    .menu a:hover::before,
    .menu a:hover::after {
      color: #FFBF00;
    }
    /* Remove brackets on links with the no-brackets class */
    .menu a.no-brackets::before,
    .menu a.no-brackets::after {
      content: "";
    }
    /* Active link styling */
    .active {
      color: green;
    }
    /* Force welcome text to always be green */
    .menu a.welcome,
    .menu a.welcome:hover {
      color: green !important;
    }
  </style>
</head>
