# ============================================================
# jesse.ventures — Netlify Configuration
# ============================================================

[build]
  publish = "."
  functions = "netlify/functions"

# Redirects
[[redirects]]
  from = "/home"
  to = "/"
  status = 301

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
