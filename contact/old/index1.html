<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Jesse.Ventures</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Consolas', monospace;
      background-color: #0a0a0a;
      color: #FFB000;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 18px;
      padding: 2rem 1.5rem;
      -webkit-font-smoothing: antialiased;
    }

    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: repeating-linear-gradient(
        to bottom,
        transparent, transparent 2px,
        rgba(0, 0, 0, 0.12) 2px, rgba(0, 0, 0, 0.12) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    .page { max-width: 500px; width: 100%; }

    .border-line {
      color: #00FF41;
      text-shadow: 0 0 4px rgba(0, 255, 65, 0.4), 0 0 12px rgba(0, 255, 65, 0.15);
      user-select: none;
    }

    .divider-line {
      color: #00FF41;
      opacity: 0.35;
      text-shadow: 0 0 6px rgba(0, 255, 65, 0.1);
      user-select: none;
      margin: 1.5rem 0;
    }

    h1 {
      font-size: 18px;
      font-weight: 700;
      color: #FFB000;
      margin: 0.75rem 0;
      text-shadow: 0 0 7px rgba(255, 176, 0, 0.6), 0 0 20px rgba(255, 176, 0, 0.25);
    }

    .email {
      font-size: 16px;
      margin-top: 1.5rem;
    }

    .email a {
      color: #FFB000;
      text-decoration: none;
      text-shadow: 0 0 5px rgba(255, 176, 0, 0.35), 0 0 14px rgba(255, 176, 0, 0.12);
      transition: all 0.25s ease;
    }

    .email a:hover {
      color: #FFD700;
      text-shadow: 0 0 8px rgba(255, 215, 0, 0.7), 0 0 24px rgba(255, 215, 0, 0.3);
    }

    .back {
      margin-top: 2rem;
      font-size: 14px;
    }

    .back a {
      color: #00FF41;
      text-decoration: none;
      text-shadow: 0 0 5px rgba(0, 255, 65, 0.35);
      transition: all 0.25s ease;
    }

    .back a:hover {
      text-shadow: 0 0 8px rgba(0, 255, 65, 0.6), 0 0 20px rgba(0, 255, 65, 0.25);
    }
  </style>
</head>
<body>

  <div class="page">
    <div class="border-line">══════════════════════════</div>
    <h1>CONTACT</h1>
    <div class="border-line">══════════════════════════</div>

    <div class="divider-line">──────────────────────────</div>

    <div class="email">
      <a href="mailto:Jesse@raineyventures.com">Jesse@raineyventures.com</a>
    </div>

    <div class="divider-line">──────────────────────────</div>

    <div class="back">
      <a href="/">&larr; jesse.ventures</a>
    </div>
  </div>

</body>
</html>
