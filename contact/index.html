<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Jesse.Ventures</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'JetBrains Mono', 'Consolas', monospace;
      background: #0a0a0a;
      color: #FFB000;
      min-height: 100vh;
      padding: 2.5rem 1.5rem;
      -webkit-font-smoothing: antialiased;
    }

    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    .wrap { max-width: 560px; margin: 0 auto; }

    .border-line {
      color: #00FF41;
      font-size: 0.78rem;
      letter-spacing: 0.04em;
      opacity: 0.8;
      user-select: none;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #FFB000;
      letter-spacing: 0.1em;
      margin: 0.5rem 0;
      text-shadow: 0 0 10px rgba(255,176,0,0.4);
    }

    .divider { border: none; border-top: 1px dashed #2a1f06; margin: 1.5rem 0; }

    .photo-block { margin: 1.5rem 0 0.5rem; }

    .photo-frame {
      display: inline-block;
      background: #f5f0e8;
      padding: 10px 10px 32px 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(0,0,0,0.08);
      transform: rotate(-1.2deg);
      position: relative;
      max-width: 260px;
    }

    .photo-frame img {
      display: block;
      width: 100%;
      filter: sepia(0.15) contrast(0.95) brightness(0.97);
    }

    .photo-caption {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.46rem;
      color: #3a2a10;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0 8px;
      text-align: center;
    }

    .ident-block { margin-top: 1.25rem; }

    .label {
      font-size: 0.52rem;
      color: #00FF41;
      opacity: 0.5;
      letter-spacing: 0.18em;
      margin-bottom: 0.2rem;
    }

    .ident-name {
      font-size: 1.5rem;
      font-weight: 700;
      color: #FFB000;
      text-shadow: 0 0 12px rgba(255,176,0,0.35);
      letter-spacing: 0.06em;
      line-height: 1.1;
    }

    .ident-email { margin-top: 0.75rem; }

    .ident-email a {
      font-size: 0.82rem;
      color: #FFB000;
      text-decoration: none;
      transition: text-shadow 0.2s;
    }
    .ident-email a:hover { text-shadow: 0 0 10px rgba(255,176,0,0.7); }

    .section-label {
      font-size: 0.58rem;
      color: #00FF41;
      opacity: 0.55;
      letter-spacing: 0.18em;
      margin-bottom: 0.75rem;
    }

    .terminal-form {
      border: 1px solid #2a1f06;
      padding: 1rem;
      background: #0d0c09;
    }

    .field-row {
      display: grid;
      grid-template-columns: 90px 1fr;
      align-items: center;
      margin-bottom: 0.6rem;
      gap: 0.5rem;
    }

    .field-prompt {
      font-size: 0.68rem;
      color: #00FF41;
      opacity: 0.5;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    .field-input {
      background: transparent;
      border: none;
      border-bottom: 1px solid #2a1f06;
      color: #FFB000;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      padding: 0.15rem 0.25rem;
      outline: none;
      width: 100%;
      transition: border-color 0.2s;
    }
    .field-input:focus { border-bottom-color: #FFB000; }
    .field-input::placeholder { color: #2a1f06; opacity: 1; }

    .message-area { margin-top: 0.75rem; }
    .message-area .field-prompt { margin-bottom: 0.35rem; display: block; }

    textarea.field-input {
      border: 1px solid #2a1f06;
      display: block;
      width: 100%;
      min-height: 80px;
      resize: vertical;
      padding: 0.4rem 0.5rem;
      line-height: 1.6;
    }
    textarea.field-input:focus { border-color: #FFB000; }

    .form-footer {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }

    .send-btn {
      background: transparent;
      border: 1px solid #2a1f06;
      color: #FFB000;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      padding: 0.45rem 1.2rem;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .send-btn:hover { border-color: #FFB000; background: #1a1200; }

    .success-flash {
      border: 1px solid #00FF41;
      background: #0a120a;
      padding: 0.6rem 0.9rem;
      font-size: 0.68rem;
      color: #00FF41;
      letter-spacing: 0.08em;
      margin-bottom: 1rem;
      opacity: 0.85;
    }
    .success-flash::before { content: '> '; }

    .back-link {
      display: inline-block;
      margin-top: 2.5rem;
      font-size: 0.72rem;
      color: #00FF41;
      text-decoration: none;
      opacity: 0.6;
      transition: opacity 0.2s;
    }
    .back-link:hover { opacity: 1; }

    @media (max-width: 500px) {
      .photo-frame { max-width: 200px; }
      .ident-name { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <div class="border-line">══════════════════════════════════</div>
  <h1>CONTACT</h1>
  <div class="border-line">══════════════════════════════════</div>

  <hr class="divider">

  <div style="display:flex; gap:1.75rem; align-items:flex-start; flex-wrap:wrap;">
    <div class="photo-block">
      <div class="photo-frame">
        <img src="how-to-get-there.jpg" alt="Jesse, December 1994">
        <div class="photo-caption">Beijing &mdash; December 1994 &mdash; figuring out how to get there</div>
      </div>
    </div>

    <div class="ident-block">
      <div class="label">// OPERATOR</div>
      <div class="ident-name">JESSE</div>
      <div class="ident-email" style="margin-top:1rem;">
        <div class="label">// EMAIL</div>
        jesse.lunsford@gmail.com
      </div>
    </div>
  </div>

  <hr class="divider">

  <!-- Netlify Form — submissions go to your Netlify dashboard and email -->
  <div class="section-label">// GUESTBOOK &mdash; LEAVE A MESSAGE</div>

  <!-- success message shown after redirect -->
  <div id="success-msg" class="success-flash" style="display:none;">MESSAGE LOGGED. THANKS FOR STOPPING BY.</div>

  <form class="terminal-form" name="guestbook" method="POST" data-netlify="true" action="/contact/?sent=1">
    <input type="hidden" name="form-name" value="guestbook">
    <div class="field-row">
      <span class="field-prompt">NAME &gt;</span>
      <input class="field-input" type="text" name="name" maxlength="100"
             placeholder="required" autocomplete="off" spellcheck="false">
    </div>
    <div class="message-area">
      <span class="field-prompt">MESSAGE &gt;</span>
      <textarea class="field-input" name="message" maxlength="1000"
                placeholder="required" spellcheck="false"></textarea>
    </div>
    <div class="form-footer">
      <button class="send-btn" type="submit">[ SIGN GUESTBOOK ]</button>
    </div>
  </form>

  <a class="back-link" href="/">[&larr; jesse.ventures]</a>

</div>

<script>
  // Show success message if redirected back with ?sent=1
  if (window.location.search.includes('sent=1')) {
    document.getElementById('success-msg').style.display = 'block';
  }
</script>
</body>
</html>
